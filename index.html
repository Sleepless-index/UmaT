<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0b0d12"/>
<title>Uma Musume Race Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;font-family:system-ui,sans-serif;font-size:14px;">
    Loading…
  </div>
</div>

<!-- React + ReactDOM (UMD) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!--
  No build step / bundler — everything below is a plain global-scope
  script, same as the original single-file app.js. Load order matters:
  data first, then small shared "atom" components, then composite
  components that use those atoms, then app.js last.
-->

<!-- Data layer -->
<script src="data/constants.js"></script>
<script src="data/tracks.js"></script>
<script src="data/stats.js"></script>
<script src="data/trackMatch.js"></script>
<script src="data/importParse.js"></script>

<!-- Shared atoms -->
<script src="components/Icon.js"></script>
<script src="components/UmaAvatar.js"></script>
<script src="components/Pill.js"></script>
<script src="components/SortFilterDropdowns.js"></script>
<script src="components/TrackPicker.js"></script>

<!-- Race entry (round-based) -->
<script src="components/RoundCard.js"></script>
<script src="components/RaceFormModal.js"></script>

<!-- Tabs -->
<script src="components/StandingsTab.js"></script>
<script src="components/TrendsTab.js"></script>
<script src="components/RacesTab.js"></script>
<script src="components/ProfileTab.js"></script>

<!-- Modals -->
<script src="components/RaceViewModal.js"></script>

<!-- Import -->
<script src="components/ImportRoundPreview.js"></script>
<script src="components/BatchImportModal.js"></script>

<!-- App shell (Settings, Icon Roster, icon picker) -->
<script src="app.js"></script>
</body>
</html>
